name: Build Family Cloud Native APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        run: gradle clean assembleDebug --stacktrace

      - name: List APK files
        run: ls -lh app/build/outputs/apk/debug/ || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: family-cloud-native-debug-apk
          path: app/build/outputs/apk/debug/*.apk
